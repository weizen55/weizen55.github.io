<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaussian Splat ビューア</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0/spark.module.js"
      }
    }
  </script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    #loading {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #eee;
      font-family: sans-serif;
      background: rgb(0 0 0 / 55%);
      padding: 0.5rem 0.75rem;
      border-radius: 0.4rem;
    }
  </style>
</head>
<body>
  <div id="loading">model.ply を読み込み中...</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { SparkRenderer, SplatMesh } from '@sparkjsdev/spark';

    const loading = document.getElementById('loading');

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(-1, -4, 6);
    camera.up.set(0, -1, -0.6).normalize();
    camera.lookAt(0, 4, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 4, 0);
    controls.update();

    const spark = new SparkRenderer({ renderer });
    scene.add(spark);

    const splats = new SplatMesh({
      url: './model.ply',
      onProgress: (event) => {
        if (!loading || !event.lengthComputable) return;

        const percent = Math.round((event.loaded / event.total) * 100);
        loading.textContent = `model.ply を読み込み中... ${percent}%`;
      }
    });
    scene.add(splats);

    splats.initialized
      .then(() => {
        if (loading) loading.remove();
      })
      .catch((err) => {
        console.error(err);
        document.body.innerHTML =
          '<p style="color:#eee;font-family:sans-serif;padding:1rem;">model.ply の読み込みに失敗しました。' +
          '同じフォルダに model.ply を置き、<code style="color:#9cf;">http://localhost:8000</code> のようにローカルサーバー経由で開いてください。</p>';
      });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
